name: 'catchai security scan'
description: |
  Multi-layer security scan: dependencies (CVE/OSV), SAST, secrets,
  IaC, deep taint, authz model, and optional LLM-driven semantic
  review. Posts findings to GitHub Code Scanning (Security tab) and
  optionally summarises on the PR conversation.

# Marketplace metadata.
author: 'MihailMihaylov97'
branding:
  icon: 'shield'
  color: 'red'

# ---------------------------------------------------------------------------
# Inputs
# ---------------------------------------------------------------------------
inputs:
  path:
    description: 'Directory to scan. Defaults to the repository root.'
    required: false
    default: '.'

  semantic:
    description: |
      Run Layer 7 (LLM semantic review). Requires an Anthropic API key
      via ``anthropic-api-key``. Off by default — adds LLM cost.
    required: false
    default: 'false'

  semantic-mode:
    description: |
      L7 review strategy. ``files`` triages source files and reviews
      each ranked file; ``flows`` detects HTTP/CLI/task entry points
      and reviews each one's reachable call graph as an attack story.
      No-op when ``semantic`` is false.
    required: false
    default: 'files'

  semantic-top-n:
    description: 'Max files (files mode) or flows (flows mode) the L7 stage will review.'
    required: false
    default: '20'

  semantic-chain-review:
    description: |
      Enable cross-flow exploit chain review (LLM stage that pairs
      flows to surface multi-step exploits). Only meaningful when
      ``semantic-mode=flows``. Off by default — adds LLM cost.
    required: false
    default: 'false'

  semantic-verbose:
    description: 'Print one progress line per L7 LLM call as it completes.'
    required: false
    default: 'false'

  anthropic-api-key:
    description: |
      Anthropic API key for L7 LLM calls. Required when
      ``semantic=true``. Pass via a repository or organisation secret —
      NEVER hardcode. Treated as an environment variable for the
      ``catchai`` process; never logged.
    required: false

  upload-sarif:
    description: |
      Upload the scan SARIF to GitHub Code Scanning so findings
      appear in the repository's Security tab. Requires
      ``security-events: write`` permission on the workflow.
      Set to ``false`` to skip (e.g. when GHAS isn't enabled on a
      private repo).
    required: false
    default: 'true'

  fail-on-severity:
    description: |
      Minimum severity that fails the workflow step. One of
      ``critical|high|medium|low|info|none``. Default ``high`` matches
      ``catchai scan``'s default exit-code contract (exit 1 on
      blocking findings).
    required: false
    default: 'high'

  comment-on-pr:
    description: |
      Post (or update) a summary comment on the PR conversation with
      finding counts, a link to the Security tab, and the worst
      severities. Requires ``pull-requests: write`` permission. No-op
      outside ``pull_request`` events.
    required: false
    default: 'true'

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
outputs:
  total-findings:
    description: 'Total active findings produced by the scan.'
    value: ${{ steps.scan.outputs.total }}
  critical-findings:
    description: 'Number of critical-severity findings.'
    value: ${{ steps.scan.outputs.critical }}
  high-findings:
    description: 'Number of high-severity findings.'
    value: ${{ steps.scan.outputs.high }}
  sarif-path:
    description: 'Filesystem path to the generated SARIF report.'
    value: ${{ steps.scan.outputs.sarif }}
  json-path:
    description: 'Filesystem path to the generated JSON report.'
    value: ${{ steps.scan.outputs.json }}

# ---------------------------------------------------------------------------
# Implementation
# ---------------------------------------------------------------------------
runs:
  using: 'composite'
  steps:
    - name: Install catchai
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Installing catchai"
        # The catchai-dist install script downloads the platform-appropriate
        # pre-built wheel. We curl rather than `pip install` so the action
        # works on runners without Python tooling pre-installed (e.g. some
        # ARM runners) — the install script picks the right wheel.
        curl -fsSL \
          https://raw.githubusercontent.com/MihailMihaylov97/catchai-dist/main/install.sh \
          | bash
        # The install script writes the binary to ~/.local/bin; surface it
        # for subsequent steps in the same job.
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "::endgroup::"

    - name: Verify install
      shell: bash
      run: |
        catchai --version

    - name: Run scan
      id: scan
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set -euo pipefail
        cd "${{ inputs.path }}"

        # Build the argv. Most flags map 1:1 from inputs; semantic flags
        # only fire when --semantic is on, so the cheaper deterministic
        # scan (L1-L6) is the default and adds no LLM cost.
        ARGS=(scan . --save)
        if [[ "${{ inputs.semantic }}" == "true" ]]; then
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::semantic=true requires anthropic-api-key (pass via secret)"
            exit 2
          fi
          ARGS+=(--semantic)
          ARGS+=(--semantic-mode "${{ inputs.semantic-mode }}")
          ARGS+=(--semantic-top-n "${{ inputs.semantic-top-n }}")
          if [[ "${{ inputs.semantic-chain-review }}" == "true" ]]; then
            ARGS+=(--semantic-chain-review)
          fi
          if [[ "${{ inputs.semantic-verbose }}" == "true" ]]; then
            ARGS+=(--semantic-verbose)
          fi
        fi

        # Run the scan. Capture exit so we can apply the per-input
        # ``fail-on-severity`` policy (default ``high`` mirrors catchai's
        # own contract; ``none`` disables the gate entirely).
        echo "::group::catchai ${ARGS[*]}"
        set +e
        catchai "${ARGS[@]}"
        SCAN_EXIT=$?
        set -e
        echo "::endgroup::"

        # Locate the generated reports. ``--save`` writes into
        # reports/<basename>/scan_*.{txt,json,sarif,html}.
        REPORT_DIR="reports/$(basename "$PWD")"
        SARIF=$(ls "$REPORT_DIR"/scan_*.sarif 2>/dev/null | head -1 || true)
        JSON=$(ls "$REPORT_DIR"/scan_*.json 2>/dev/null | head -1 || true)
        if [[ -z "$JSON" ]]; then
          echo "::error::scan completed but no JSON report found at $REPORT_DIR"
          exit 4
        fi

        # Pull severity counts from the canonical JSON for the outputs +
        # the fail-on policy.
        TOTAL=$(jq '.summary.total // 0' "$JSON")
        CRITICAL=$(jq '.summary.by_severity.critical // 0' "$JSON")
        HIGH=$(jq '.summary.by_severity.high // 0' "$JSON")
        MEDIUM=$(jq '.summary.by_severity.medium // 0' "$JSON")
        LOW=$(jq '.summary.by_severity.low // 0' "$JSON")
        INFO=$(jq '.summary.by_severity.info // 0' "$JSON")

        echo "total=$TOTAL"           >> "$GITHUB_OUTPUT"
        echo "critical=$CRITICAL"     >> "$GITHUB_OUTPUT"
        echo "high=$HIGH"             >> "$GITHUB_OUTPUT"
        echo "medium=$MEDIUM"         >> "$GITHUB_OUTPUT"
        echo "low=$LOW"               >> "$GITHUB_OUTPUT"
        echo "info=$INFO"             >> "$GITHUB_OUTPUT"
        echo "sarif=$PWD/$SARIF"      >> "$GITHUB_OUTPUT"
        echo "json=$PWD/$JSON"        >> "$GITHUB_OUTPUT"
        echo "report-dir=$PWD/$REPORT_DIR" >> "$GITHUB_OUTPUT"

        # Apply the fail-on-severity policy. catchai itself exits 1 on
        # blocking findings (critical/high) — we override that gate with
        # a per-input threshold so the same Action can be used for
        # advisory scans (fail-on=none) and CI gates (fail-on=critical).
        case "${{ inputs.fail-on-severity }}" in
          none)
            FAIL=0 ;;
          info)
            FAIL=$(( TOTAL > 0 ? 1 : 0 )) ;;
          low)
            FAIL=$(( CRITICAL + HIGH + MEDIUM + LOW > 0 ? 1 : 0 )) ;;
          medium)
            FAIL=$(( CRITICAL + HIGH + MEDIUM > 0 ? 1 : 0 )) ;;
          high)
            FAIL=$(( CRITICAL + HIGH > 0 ? 1 : 0 )) ;;
          critical)
            FAIL=$(( CRITICAL > 0 ? 1 : 0 )) ;;
          *)
            echo "::error::invalid fail-on-severity: ${{ inputs.fail-on-severity }}"
            exit 2 ;;
        esac

        if [[ "$FAIL" == "1" ]]; then
          echo "::warning::catchai found findings at or above the '${{ inputs.fail-on-severity }}' threshold (critical=$CRITICAL high=$HIGH medium=$MEDIUM total=$TOTAL)"
          # Defer the actual failure to the end-of-job step below so the
          # SARIF upload + PR comment still run.
          echo "fail=1" >> "$GITHUB_OUTPUT"
        else
          echo "fail=0" >> "$GITHUB_OUTPUT"
        fi

        # Honour catchai's own non-recoverable exit codes (>=2). Exit 1
        # is "blocking findings" which we already accounted for above.
        if [[ "$SCAN_EXIT" -ge 2 ]]; then
          echo "::error::catchai exited with $SCAN_EXIT (binary error)"
          exit "$SCAN_EXIT"
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: ${{ inputs.upload-sarif == 'true' && steps.scan.outputs.sarif != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: catchai

    - name: Upload report bundle as workflow artifact
      if: always() && steps.scan.outputs.report-dir != ''
      uses: actions/upload-artifact@v4
      with:
        name: catchai-report
        path: ${{ steps.scan.outputs.report-dir }}
        retention-days: 7

    - name: Post / update PR summary comment
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        TOTAL: ${{ steps.scan.outputs.total }}
        CRITICAL: ${{ steps.scan.outputs.critical }}
        HIGH: ${{ steps.scan.outputs.high }}
        MEDIUM: ${{ steps.scan.outputs.medium }}
        LOW: ${{ steps.scan.outputs.low }}
        INFO: ${{ steps.scan.outputs.info }}
      with:
        script: |
          // Marker line lets us find + replace prior comments instead of
          // stacking a fresh one on every push to the PR branch.
          const marker = '<!-- catchai-scan-summary -->';
          const total = process.env.TOTAL;
          const critical = process.env.CRITICAL;
          const high = process.env.HIGH;
          const medium = process.env.MEDIUM;
          const low = process.env.LOW;
          const info = process.env.INFO;

          const blocking = parseInt(critical) + parseInt(high);
          const status = blocking > 0
            ? `:rotating_light: **${blocking} blocking finding(s)** — review the Security tab.`
            : `:white_check_mark: No critical/high findings.`;

          const body = [
            marker,
            '## catchai scan',
            '',
            status,
            '',
            '| Severity | Count |',
            '|---|---|',
            `| Critical | ${critical} |`,
            `| High | ${high} |`,
            `| Medium | ${medium} |`,
            `| Low | ${low} |`,
            `| Info | ${info} |`,
            `| **Total** | **${total}** |`,
            '',
            'Detailed findings: see the [Security tab](../security/code-scanning) ' +
            '(SARIF uploaded) or download the `catchai-report` workflow artifact ' +
            'for the full HTML / JSON report.',
          ].join('\n');

          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;

          // Find the prior catchai comment, if any.
          const existing = await github.paginate(
            github.rest.issues.listComments,
            { owner, repo, issue_number, per_page: 100 }
          );
          const prior = existing.find(c => c.body && c.body.includes(marker));

          if (prior) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: prior.id, body
            });
          } else {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body
            });
          }

    - name: Apply fail-on-severity gate
      shell: bash
      run: |
        if [[ "${{ steps.scan.outputs.fail }}" == "1" ]]; then
          echo "::error::scan failed the '${{ inputs.fail-on-severity }}' severity gate"
          exit 1
        fi
